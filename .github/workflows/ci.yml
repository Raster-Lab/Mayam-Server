name: CI

on:
  push:
    branches: [ main, "release/**" ]
  pull_request:
    branches: [ main, "release/**" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test-linux:
    name: Linux (Swift 6.2)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset SPM cache
        run: swift package purge-cache && swift package reset && swift package update

      - name: Build
        run: swift build --build-tests --enable-code-coverage

      - name: Test
        timeout-minutes: 15
        run: swift test --skip-build --enable-code-coverage --skip LDAPIntegrationTests

      - name: Generate Coverage Report
        run: |
          llvm-cov export \
            .build/debug/MayamServerPackageTests.xctest \
            -instr-profile .build/debug/codecov/default.profdata \
            -format lcov \
            > coverage.lcov || true

  build-and-test-macos:
    name: macOS (Swift 6.2)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Reset SPM cache
        run: swift package purge-cache && swift package reset && swift package update

      - name: Build
        run: swift build --build-tests --enable-code-coverage

      - name: Test
        timeout-minutes: 30
        run: swift test --skip-build --enable-code-coverage --skip LDAPIntegrationTests

  lint:
    name: Swift Lint
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset SPM cache
        run: swift package purge-cache && swift package reset && swift package update

      - name: Build (strict concurrency check)
        run: swift build 2>&1 | tee build-output.txt

      - name: Check for warnings
        run: |
          if grep -i "warning:" build-output.txt; then
            echo "::warning::Build produced warnings — please review"
          fi
