# Mayam — Default Configuration
# See README.md for documentation on all configuration options.

dicom:
  aeTitle: "MAYAM"
  port: 11112
  maxAssociations: 64
  tlsEnabled: false
  # tlsCertificatePath: "/etc/mayam/certs/server.pem"
  # tlsKeyPath: "/etc/mayam/certs/server-key.pem"

storage:
  archivePath: "/var/lib/mayam/archive"
  checksumEnabled: true

log:
  level: "info"
