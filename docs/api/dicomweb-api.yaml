components:
  securitySchemes:
    tls:
      type: mutualTLS
      description: >
        Optional mutual TLS authentication.  When TLS is enabled the
        server validates client certificates against the configured
        trust store.

  parameters:
    StudyUID:
      name: studyUID
      in: path
      required: true
      description: DICOM Study Instance UID (0020,000D).
      schema:
        type: string
        examples: ["1.2.840.113619.2.55.3.604688119.969.1068871842.109"]
    SeriesUID:
      name: seriesUID
      in: path
      required: true
      description: DICOM Series Instance UID (0020,000E).
      schema:
        type: string
    InstanceUID:
      name: instanceUID
      in: path
      required: true
      description: DICOM SOP Instance UID (0008,0018).
      schema:
        type: string
    WorkitemUID:
      name: workitemUID
      in: path
      required: true
      description: UPS Workitem SOP Instance UID.
      schema:
        type: string
    AETitle:
      name: aeTitle
      in: path
      required: true
      description: DICOM Application Entity Title of the subscriber.
      schema:
        type: string
        maxLength: 16
    FHIRResourceId:
      name: id
      in: path
      required: true
      description: Logical FHIR resource identifier.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of results to return.
      schema:
        type: integer
        minimum: 1
        default: 100
    Offset:
      name: offset
      in: query
      description: Number of results to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
    IncludeField:
      name: includefield
      in: query
      description: >
        DICOM attribute keyword or `all` to include additional fields
        in the response.
      schema:
        type: string
    FuzzyMatching:
      name: fuzzymatching
      in: query
      description: Enable fuzzy semantic matching of person names.
      schema:
        type: boolean
        default: false

  schemas:
    DicomJsonObject:
      type: object
      description: >
        A DICOM JSON Model object as defined in DICOM PS3.18 §F.2.
        Each key is an eight-character DICOM tag (e.g. `0020000D`)
        and the value contains `vr` and `Value` fields.
      additionalProperties:
        type: object
        properties:
          vr:
            type: string
            description: DICOM Value Representation.
          Value:
            type: array
            description: Attribute values.
            items: {}
          BulkDataURI:
            type: string
            format: uri
            description: URI reference for bulk data retrieval.

    StowResponse:
      type: object
      description: >
        STOW-RS response dataset containing references to stored,
        failed, and warning instances.
      properties:
        "00081190":
          type: object
          description: Retrieve URL (0008,1190).
          properties:
            vr:
              type: string
              const: UR
            Value:
              type: array
              items:
                type: string
                format: uri
        "00081198":
          type: object
          description: Failed SOP Sequence (0008,1198).
          properties:
            vr:
              type: string
              const: SQ
            Value:
              type: array
              items:
                type: object
        "00081199":
          type: object
          description: Referenced SOP Sequence (0008,1199).
          properties:
            vr:
              type: string
              const: SQ
            Value:
              type: array
              items:
                type: object

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Overall health status.
          enum: [healthy, degraded, unhealthy]
        database:
          type: string
          description: Database connectivity status.
          enum: [ok, error]
        storage:
          type: string
          description: Storage subsystem status.
          enum: [ok, degraded, error]
        uptime:
          type: number
          format: double
          description: Server uptime in seconds.

    FHIRResource:
      type: object
      description: >
        A FHIR R4 resource.  The `resourceType` property identifies
        the concrete type (e.g. Patient, ImagingStudy).
      required: [resourceType]
      properties:
        resourceType:
          type: string
          description: FHIR resource type name.
          examples: ["Patient", "ImagingStudy", "CapabilityStatement"]
        id:
          type: string
          description: Logical resource identifier.
        meta:
          type: object
          properties:
            versionId:
              type: string
            lastUpdated:
              type: string
              format: date-time
      additionalProperties: true

    FHIRBundle:
      type: object
      description: A FHIR R4 Bundle resource containing search results.
      required: [resourceType, type]
      properties:
        resourceType:
          type: string
          const: Bundle
        type:
          type: string
          const: searchset
        total:
          type: integer
          description: Total number of matching resources.
        link:
          type: array
          items:
            type: object
            properties:
              relation:
                type: string
                description: Link relation (e.g. `self`, `next`).
              url:
                type: string
                format: uri
        entry:
          type: array
          items:
            type: object
            properties:
              fullUrl:
                type: string
                format: uri
              resource:
                $ref: "#/components/schemas/FHIRResource"
